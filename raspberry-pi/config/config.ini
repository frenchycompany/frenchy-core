# Configuration du SMS relay (Raspberry Pi)
# IMPORTANT : Ce fichier ne doit PAS être committé avec des credentials réels
# En production, copier ce fichier et remplir les valeurs

[MODEM]
port = /dev/ttyUSB0
pin = 1234

[MODEMS]
modem1 = /dev/ttyUSB0
baudrate = 115200

[DATABASE]
# Après migration : le RPi se connecte à la base du VPS en distant
# Remplacer CHANGE_ME_VPS_IP par l'IP ou hostname de ton VPS IONOS
host = CHANGE_ME_VPS_IP
port = 3306
user = CHANGE_ME
password = CHANGE_ME
database = frenchyconciergerie

[OPENAI]
# IMPORTANT : Révoquer l'ancienne clé et en générer une nouvelle
# sur https://platform.openai.com/api-keys
api_key = CHANGE_ME

[SATISFACTION]
table = satisfaction_conversations

[FALLBACK]
numero_admin = +33XXXXXXXXX
mots_declencheurs = code, champagne, champ, shamp, bouteille, bulles, taxi, tacsi, transport, navette, chauffeur, uber, départ tardif, late checkout, partir plus tard, check out tard, quitter après, massage, relax, spa, détente, massaj, soin, urgence, urgent, vite, problème grave, souci, bug, panne, cassé, dysfonctionnement, arrivée tardive, j'arrive tard, entrer tard, entrée tardive, je serai en retard, arriver avant, accéder avant, je suis en avance, entrée anticipée, je peux venir avant, rejoindre
